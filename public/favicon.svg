<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D5D3CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6FA9BB;stop-opacity:1" />
    </linearGradient>
  </defs>
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }
    @keyframes rotate-sun {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .cloud { animation: float 3s ease-in-out infinite; }
    .sun { 
      animation: rotate-sun 12s linear infinite; 
      transform-origin: 65px 35px;
    }
  </style>
  <circle class="sun" cx="65" cy="35" r="18" fill="#FF8A65" />
  <path class="cloud" d="M30,75 C30,60 45,55 50,55 C55,45 75,45 80,55 C90,55 95,65 90,75 C90,85 80,85 75,85 L35,85 C25,85 20,80 20,75 C20,65 25,65 30,75 Z" fill="url(#cloudGrad)" />
</svg>
